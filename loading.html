<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузка</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 1.5s ease-in-out;
        }
        .bg-image.active { opacity: 1; }
        .center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2; color: #fff; text-align: center; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="bg-container"></div>
    <div class="center-text">
        <h1 id="servername">Загрузка сервера...</h1>
    </div>

    <script type="text/javascript">
        // --- ВПИСЫВАЙ СЮДА ИМЕНА ФАЙЛОВ ИЗ ПАПКИ images/backgrounds/ ---
        // Например: './images/backgrounds/1.jpg', './images/backgrounds/2.png'
        const backgrounds = [
            './images/backgrounds/1.jpg',
            './images/backgrounds/2.png',
            './images/backgrounds/3.gif'
        ];

        const container = document.getElementById('bg-container');

        backgrounds.forEach((src, index) => {
            const div = document.createElement('div');
            div.className = 'bg-image';
            div.style.backgroundImage = `url('${src}')`;
            if (index === 0) div.classList.add('active');
            container.appendChild(div);
        });

        const images = container.querySelectorAll('.bg-image');
        let currentIndex = 0;

        function nextBackground() {
            images[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % images.length;
            images[currentIndex].classList.add('active');
        }

        if (images.length > 0) {
            setInterval(nextBackground, 5000);
        }

        // Функция от GMod
        function GameDetails(servername) {
            document.getElementById("servername").textContent = servername;
        }
    </script>
</body>
</html>
