<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка...</title>

    <!-- Подключаем шрифт Share Tech Mono (локально) -->
    <style>
        @font-face {
            font-family: 'Share Tech Mono';
            src: url('./resource/fonts/ShareTechMonoRegular_0.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Share Tech Mono', 'Arial', monospace;
            background: #0a0a0c;
        }

        /* Контейнер для фоновых изображений */
        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: #0a0a0c;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2.5s ease-in-out;
        }

        .bg-image.active {
            opacity: 1;
        }

        /* Полупрозрачное затемнение */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 12, 0.65);
            z-index: 1;
        }

        /* Логотип (слева сверху) */
        #logo {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 2;
            max-width: 220px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.8));
        }

        /* Центральный блок */
        .center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            color: #fff;
            text-align: center;
            text-shadow: 0 0 30px rgba(0,0,0,0.95);
            pointer-events: none;
        }

        .center-text h1 {
            font-size: 3.8rem;
            letter-spacing: 6px;
            margin-bottom: 10px;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
        }

        .center-text h1 span {
            color: #cc0000;
        }

        .center-text p {
            font-size: 1.5rem;
            opacity: 0.75;
            font-weight: 300;
            letter-spacing: 2px;
            color: #dddddd;
        }

        /* Нижняя информационная строка (стиль как в голосовании) */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 2;
            background: rgba(10, 10, 12, 0.9);
            border-top: 2px solid #880000;
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #aaa;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .bottom-bar .left {
            color: #aaa;
        }

        .bottom-bar .right {
            color: #888;
        }

        .bottom-bar .highlight {
            color: #cc0000;
            font-weight: bold;
        }

        /* Маленькая анимация точек загрузки */
        .loading-dots::after {
            content: '';
            animation: dots 1.8s steps(4, end) infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .center-text h1 { font-size: 2.2rem; letter-spacing: 3px; }
            .center-text p { font-size: 1rem; }
            #logo { max-width: 140px; top: 20px; left: 20px; }
            .bottom-bar { flex-direction: column; gap: 6px; padding: 12px 20px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <!-- Контейнер фонов -->
    <div id="bg-container"></div>

    <!-- Затемнение -->
    <div class="overlay"></div>

    <!-- Логотип -->
    <img id="logo" src="./images/logo.png" alt="Логотип сервера" onerror="this.style.display='none'">

    <!-- Центральный текст -->
    <div class="center-text">
        <h1><span>НАЗВАНИЕ</span> СЕРВЕРА</h1>
        <p>Загрузка аддонов <span class="loading-dots"></span></p>
    </div>

    <!-- Нижняя панель (информация, стиль как в голосовании) -->
    <div class="bottom-bar">
        <span class="left">⚡ <span class="highlight">Добро пожаловать</span> &nbsp;|&nbsp; <span id="map-name">Карта загружается...</span></span>
        <span class="right">v1.0 &nbsp;|&nbsp; <span id="players-count">0</span> игроков</span>
    </div>

    <!-- Аудио (автозапуск, но браузер может заблокировать) -->
    <audio id="bg-music" loop preload="auto">
        <source src="./music/theme.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает аудио.
    </audio>

    <script>
        (function() {
            // ---- Список фоновых изображений (PNG) ----
            const backgrounds = [
                './images/backgrounds/1.png',
                './images/backgrounds/2.png',
                './images/backgrounds/3.png',
                './images/backgrounds/4.png',
                // добавляйте свои
            ];

            const intervalMs = 10000;   // 10 секунд между сменами
            const container = document.getElementById('bg-container');
            const audio = document.getElementById('bg-music');

            // ---- Создаём элементы картинок ----
            backgrounds.forEach((src, index) => {
                const div = document.createElement('div');
                div.className = 'bg-image';
                div.style.backgroundImage = `url('${src}')`;
                if (index === 0) div.classList.add('active');
                container.appendChild(div);
            });

            const images = container.querySelectorAll('.bg-image');
            let currentIndex = 0;
            let timerId = null;

            function nextBackground() {
                images[currentIndex].classList.remove('active');
                currentIndex = (currentIndex + 1) % images.length;
                images[currentIndex].classList.add('active');
            }

            if (images.length > 0) {
                timerId = setInterval(nextBackground, intervalMs);
            }

            // ---- Автовоспроизведение музыки ----
            let musicStarted = false;

            function playMusic() {
                if (musicStarted) return;
                audio.play().then(() => {
                    musicStarted = true;
                }).catch(() => {
                    // если заблокировано – ничего не делаем, ждём клика
                });
            }

            // Пытаемся запустить сразу
            playMusic();

            // При любом клике/тапе по странице запускаем, если ещё не играет
            document.addEventListener('click', playMusic, { once: false });
            document.addEventListener('touchstart', playMusic, { once: false });

            // ---- (Опционально) обновление информации о карте/игроках ----
            // Здесь можно дописать получение данных от GMod через net, но для простоты оставляем статику
            // Можно динамически менять через JS, если будете передавать данные.

            // ---- Обновление счётчика игроков (пример, если есть API) ----
            // Например, можно опрашивать сервер, но для загрузочного экрана это не обязательно.

            // Просто для красоты – имитация загрузки
            const mapNameElem = document.getElementById('map-name');
            const playersElem = document.getElementById('players-count');

            // Если хотите реальные данные – используйте net или WebSocket, но это выходит за рамки.
            // Оставим как статику.
            mapNameElem.textContent = 'Ожидание...';
            playersElem.textContent = '0';

            // Можно периодически обновлять через интервал, но не обязательно.
        })();
    </script>

</body>
</html>
